name: Auto PR

on:
  push:
    branches:
      - action

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head action \
            --title "PR automático action -> main" \
            --body "Creado automáticamente desde GitHub Actions"
