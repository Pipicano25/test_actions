name: Auto PR

on:
  push:
    branches:
      - action

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Crear PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'PR automático action -> main',
                head: 'action',
                base: 'main',
                body: 'Creado automáticamente desde GitHub Actions'
              });
            } catch (error) {
              core.info(error.message);
            }

      - merge-pr:
          needs: create-pr
          runs-on: ubuntu-latest

          steps:
            - name: Merge Pull Request
              uses: actions/github-script@v7
              with:
                github-token: ${{ secrets.GITHUB_TOKEN }}
                script: |
                  const prNumber = ${{ needs.create-pr.outputs.pr_number }};

                  if (!prNumber) {
                    core.setFailed("No se encontró PR para mergear");
                    return;
                  }

                  await github.rest.pulls.merge({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                    merge_method: 'squash'
                  });
