name: Auto PR and Merge

on:
  push:
    branches:
      - action

permissions:
  contents: write
  pull-requests: write

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pytest

      - run: pytest -v

  create-pr:
    needs: tests
    runs-on: ubuntu-latest

    outputs:
      pr_number: ${{ steps.pr.outputs.pr_number }}

    steps:
      - name: Buscar PR existente o crear
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 1. Buscar PR existente
            const prs = await github.rest.pulls.list({
              owner,
              repo,
              head: `${owner}:action`,
              base: 'main',
              state: 'open'
            });

            if (prs.data.length > 0) {
              const pr = prs.data[0];
              core.setOutput("pr_number", pr.number);
              return;
            }

            // 2. Crear PR si no existe
            const newPr = await github.rest.pulls.create({
              owner,
              repo,
              title: 'PR automático action -> main',
              head: 'action',
              base: 'main',
              body: 'Creado automáticamente desde GitHub Actions'
            });

            core.setOutput("pr_number", newPr.data.number);

  merge-pr:
    needs: create-pr
    runs-on: ubuntu-latest

    steps:
      - name: Merge PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = Number("${{ needs.create-pr.outputs.pr_number }}");

            if (!prNumber) {
              core.setFailed("No PR found");
              return;
            }

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: 'squash'
            });
