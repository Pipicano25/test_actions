name: Auto PR and Merge

on:
  push:
    branches:
      - action

permissions:
  contents: write
  pull-requests: write

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest -v

  create-pr:
    needs: tests
    runs-on: ubuntu-latest

    outputs:
      pr_number: ${{ steps.create_pr.outputs.pr_number }}

    steps:
      - name: Crear Pull Request
        id: create_pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'PR automático action -> main',
              head: 'action',
              base: 'main',
              body: 'Creado automáticamente desde GitHub Actions'
            });

            core.setOutput("pr_number", pr.data.number);

  merge-pr:
    needs: create-pr
    runs-on: ubuntu-latest

    steps:
      - name: Merge Pull Request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = Number("${{ needs.create-pr.outputs.pr_number }}");

            if (!prNumber) {
              core.setFailed("No se encontró PR para mergear");
              return;
            }

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: 'squash'
            });
