name: Auto PR

on:
  push:
    branches:
      - action

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Crear PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'PR automático action -> main',
                head: 'action',
                base: 'main',
                body: 'Creado automáticamente desde GitHub Actions'
              });
            } catch (error) {
              core.info(error.message);
            }
